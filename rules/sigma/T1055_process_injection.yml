title: Process Injection via Common API Patterns
id: d5e8f1a4-6b7c-8d9e-0f1a-2b3c4d5e6f7a
status: production
description: >
  Detects process injection indicators: CreateRemoteThread calls across process
  boundaries, VirtualAllocEx in a remote process, or unusual parent-child process
  relationships indicative of shellcode injection. Covers T1055 sub-techniques.
references:
  - https://attack.mitre.org/techniques/T1055/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1055/T1055.md
author: Detection Engineering Team
date: 2024-02-01
modified: 2024-03-20
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
  - attack.t1055.001
  - attack.t1055.002
  - atomic_red_team
logsource:
  product: windows
  category: create_remote_thread
detection:
  # CreateRemoteThread from suspicious sources
  selection_remote_thread:
    EventID: 8  # Sysmon CreateRemoteThread
    SourceImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'

  # Injection into high-value targets
  selection_target:
    TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\lsass.exe'
      - '\winlogon.exe'
      - '\spoolsv.exe'
      - '\services.exe'

  filter_legitimate:
    SourceImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Program Files\Windows Defender\'

  condition: (selection_remote_thread or selection_target) and not filter_legitimate

falsepositives:
  - Legitimate security software and EDR agents (build allowlist)
  - Some debugging tools (require approved ticket)
level: high
# Tuning history:
# 2024-02-01 - Initial. FP rate: ~8/day from EDR + Defender
# 2024-02-15 - Added legitimate source filter. FP rate: ~1/day
# 2024-03-20 - Tightened SourceImage list. FP rate: ~0.2/day
# Current TPR: 97% | FPR: 0.2 alerts/day
