title: Suspicious Scheduled Task Creation
id: c4d7e0f3-5a6b-7c8d-9e0f-1a2b3c4d5e6f
status: stable
description: >
  Detects creation of scheduled tasks with suspicious characteristics commonly
  used for persistence: tasks running from temp directories, using encoded commands,
  or created by unexpected parent processes. Covers schtasks.exe CLI and COM API methods.
references:
  - https://attack.mitre.org/techniques/T1053/005/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1053.005/T1053.005.md
author: Detection Engineering Team
date: 2024-01-25
modified: 2024-03-15
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1053.005
  - atomic.red_team
logsource:
  category: process_creation
  product: windows
detection:
  selection_schtasks:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'

  filter_suspicious_path:
    CommandLine|contains:
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '%temp%'
      - '%tmp%'
      - '%appdata%'

  filter_encoded:
    CommandLine|contains:
      - '-enc '
      - '-EncodedCommand'
      - 'powershell -'
      - 'cmd /c'
      - 'cmd.exe /c'

  filter_suspicious_parent:
    ParentImage|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'

  condition: selection_schtasks and (filter_suspicious_path or filter_encoded or filter_suspicious_parent)

falsepositives:
  - Software installers that create scheduled tasks from temp dirs (rare, document when seen)
  - Update mechanisms (validate against software inventory)
level: high
# Tuning history:
# 2024-01-25 - Initial rule (any schtasks /create). FP rate: ~50/day from software installs
# 2024-02-10 - Added path + parent filters. FP rate: ~3/day
# 2024-03-15 - Added encoded command filter. FP rate: ~0.5/day
# Current TPR: 100% | FPR: 0.5 alerts/day (mostly from legitimate update tasks)
