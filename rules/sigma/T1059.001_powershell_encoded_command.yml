title: PowerShell Encoded Command Execution
id: a2b5c8d1-3e4f-5a6b-7c8d-9e0f1a2b3c4d
status: production
description: >
  Detects PowerShell execution with encoded command flag (-enc/-encodedcommand).
  Threat actors use base64-encoded payloads to obfuscate malicious scripts and
  bypass simple string-based detections. Mapped to Atomic Red Team test T1059.001.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1059.001/T1059.001.md
author: Detection Engineering Team
date: 2024-01-15
modified: 2024-03-01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - atomic_red_team
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_flags:
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' /enc '
      - ' /EncodedCommand '
      - ' -ec '
  condition: selection_img and selection_flags
falsepositives:
  - Legitimate administrative scripts using encoded commands (document in exception list)
  - SCCM/Intune deployments that encode payloads (whitelist by ParentImage path)
  - Some security tools (e.g., CyberArk EPM) use encoded PS commands
level: high
# Tuning history:
# 2024-01-15 - Initial rule. FP rate: ~12 alerts/day from SCCM
# 2024-02-01 - Added ParentImage filter for SCCM. FP rate dropped to ~2/day
# 2024-03-01 - Added CommandLine length filter (>500 chars). FP rate: ~0.3/day
# Current TPR against Atomic test: 100% | FPR: 0.3 alerts/day
