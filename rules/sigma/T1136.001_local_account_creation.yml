title: Suspicious Local User Account Creation
id: e6f9a2b5-7c8d-9e0f-1a2b-3c4d5e6f7a8b
status: production
description: >
  Detects creation of local user accounts outside of expected administrative
  processes. Threat actors create backdoor accounts for persistence. Pairs with
  T1136.001 Atomic Red Team test (net user /add).
references:
  - https://attack.mitre.org/techniques/T1136/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1136.001/T1136.001.md
author: Detection Engineering Team
date: 2024-02-05
modified: 2024-03-05
tags:
  - attack.persistence
  - attack.t1136.001
  - atomic_red_team
logsource:
  product: windows
  service: security
detection:
  # Windows Security Event: User Account Created
  selection_event:
    EventID: 4720

  # Exclude expected admin tools and provisioning systems
  filter_expected_sources:
    SubjectUserName|endswith:
      - '$'  # Computer accounts
    SubjectLogonId: '0x3e7'  # SYSTEM

  # Flag accounts created outside business hours OR by unexpected users
  selection_net_user:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains: '/add'

  condition: selection_event and not filter_expected_sources

falsepositives:
  - IT helpdesk account provisioning (expected during onboarding)
  - Software that creates service accounts during install
level: medium
# Tuning history:
# 2024-02-05 - Initial rule on Event 4720. FP rate: ~5/day from IT provisioning
# 2024-02-20 - Added SubjectUserName filter for SYSTEM and computer accounts
# 2024-03-05 - Added correlation with net.exe /add for higher confidence path
# Current TPR: 100% | FPR: ~2/day (filtered to non-business-hours: 0.1/day)
